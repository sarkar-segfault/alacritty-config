[general]
import = ["alacritty\\catppuccin-mocha.toml"]
working_directory = "C:\\Users\\acer"

[window]
startup_mode = "Maximized"

[font]
size = 10.3

[font.normal]
family = "Jetbrains Mono NL"
style = "Regular"

[selection]
save_to_clipboard = true

[cursor.style]
shape = "beam"
blinking = "never"

[terminal.shell]
program = "C:\\Users\\acer\\vsbash.bat"

[mouse]
hide_when_typing = true

[[keyboard.bindings]]
key = "PageUp"
action = "ScrollLineUp"

[[keyboard.bindings]]
key = "PageDown"
action = "ScrollLineDown"

[[keyboard.bindings]]
key = "H"
mods = "Control"
action = "None"

[[keyboard.bindings]]
key = "L"
mods = "Control"
action = "None"

[[keyboard.bindings]]
key = "J"
mods = "Control"
action = "None"
